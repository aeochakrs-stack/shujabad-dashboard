name: Sync SIS Schools Data

on:
  schedule:
    # Run every night at midnight UTC (which is 5:00 AM Pakistan Standard Time)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Sync Script
        run: node .github/scripts/sync-all-schools.js
